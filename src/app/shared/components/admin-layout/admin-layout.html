<div class="flex h-screen overflow-hidden bg-zinc-50">

  <!-- ── Backdrop mobile ─────────────────────────────────────── -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 z-20 bg-black/50 lg:hidden"
      (click)="close()"
      aria-hidden="true"
    ></div>
  }

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside [class]="sidebarClasses()">

    <!-- Logo -->
    <div class="flex h-16 shrink-0 items-center gap-2 border-b border-zinc-800 px-5">
      <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-white">
        <span class="text-xs font-black text-zinc-900">B</span>
      </div>
      <span class="text-base font-bold tracking-tight text-white">btree</span>
      <span class="ml-auto rounded-md bg-zinc-800 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-zinc-400">
        admin
      </span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-4" (click)="close()">

      <!-- Dashboard -->
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-zinc-800 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-zinc-400 transition-colors hover:bg-zinc-800 hover:text-white"
      >
        <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Dashboard
      </a>

      <!-- Catálogo -->
      <div class="mt-6">
        <p class="mb-1.5 px-3 text-[10px] font-semibold uppercase tracking-widest text-zinc-500">
          Catálogo
        </p>

        <a
          routerLink="/catalog/brands/create"
          routerLinkActive="bg-zinc-800 text-white"
          class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-zinc-400 transition-colors hover:bg-zinc-800 hover:text-white"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
          </svg>
          Marcas
          <span class="ml-auto rounded-md bg-zinc-700 px-1.5 py-0.5 text-[10px] font-medium text-zinc-300">
            Novo
          </span>
        </a>
      </div>

      <!-- Configurações -->
      <div class="mt-6">
        <p class="mb-1.5 px-3 text-[10px] font-semibold uppercase tracking-widest text-zinc-500">
          Configurações
        </p>

        <a
          routerLink="/settings/profile"
          routerLinkActive="bg-zinc-800 text-white"
          class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-zinc-400 transition-colors hover:bg-zinc-800 hover:text-white"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Perfil
        </a>

        <a
          routerLink="/settings/two-factor"
          routerLinkActive="bg-zinc-800 text-white"
          class="group mt-0.5 flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-zinc-400 transition-colors hover:bg-zinc-800 hover:text-white"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
          Segurança (2FA)
        </a>
      </div>

    </nav>

    <!-- User footer -->
    <div class="shrink-0 border-t border-zinc-800 p-3">
      <div class="flex items-center gap-3 rounded-lg px-2 py-2">
        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-zinc-700 text-xs font-semibold text-white">
          {{ userInitial() }}
        </div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium text-zinc-200">{{ auth.user()?.username }}</p>
          <p class="truncate text-xs text-zinc-500">{{ auth.user()?.email }}</p>
        </div>
        <button
          type="button"
          (click)="auth.logout()"
          class="shrink-0 rounded-md p-1.5 text-zinc-500 transition-colors hover:bg-zinc-800 hover:text-zinc-300"
          title="Sair"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

  </aside>

  <!-- ── Content area ────────────────────────────────────────── -->
  <div class="flex flex-1 flex-col overflow-hidden">

    <!-- Mobile top bar -->
    <header class="flex h-16 shrink-0 items-center gap-3 border-b border-zinc-200 bg-white px-4 lg:hidden">
      <button
        type="button"
        (click)="toggle()"
        class="rounded-lg p-2 text-zinc-500 transition-colors hover:bg-zinc-100 hover:text-zinc-900"
        aria-label="Abrir menu"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="flex h-6 w-6 items-center justify-center rounded bg-zinc-900">
          <span class="text-[10px] font-black text-white">B</span>
        </div>
        <span class="text-sm font-bold text-zinc-900">btree admin</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>

</div>
