<div class="max-w-4xl mx-auto px-4 py-8 space-y-6">

  <!-- Back to dashboard -->
  <div>
    <a
      routerLink="/dashboard"
      class="inline-flex items-center gap-1.5 text-sm text-zinc-500 hover:text-zinc-900 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Voltar ao dashboard
    </a>
  </div>

  <!-- Loading skeleton -->
  @if (profileResource.isLoading()) {
    <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm p-6 sm:p-8 animate-pulse">
      <div class="flex flex-col sm:flex-row sm:items-center gap-6">
        <div class="w-20 h-20 rounded-full bg-zinc-200 shrink-0"></div>
        <div class="flex-1 space-y-3">
          <div class="h-5 bg-zinc-200 rounded w-48"></div>
          <div class="h-4 bg-zinc-100 rounded w-64"></div>
          <div class="flex gap-2">
            <div class="h-5 bg-zinc-100 rounded w-16"></div>
            <div class="h-5 bg-zinc-100 rounded w-16"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="grid gap-4 sm:grid-cols-2">
      @for (_ of [1, 2, 3]; track $index) {
        <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm p-6 animate-pulse space-y-3">
          <div class="h-4 bg-zinc-200 rounded w-32"></div>
          @for (__ of [1, 2, 3, 4]; track $index) {
            <div class="h-4 bg-zinc-100 rounded w-full"></div>
          }
        </div>
      }
    </div>
  }

  <!-- Error state -->
  @else if (profileResource.error()) {
    <div class="rounded-2xl border border-red-200 bg-red-50 p-6 flex flex-col items-center gap-4 text-center">
      <p class="text-sm font-semibold text-red-700">Não foi possível carregar os dados do perfil.</p>
      <button
        type="button"
        (click)="profileResource.reload()"
        class="inline-flex items-center gap-2 rounded-lg bg-zinc-900 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-700 transition-colors"
      >
        Tentar novamente
      </button>
    </div>
  }

  <!-- Profile content -->
  @else if (profileResource.hasValue()) {
    <app-profile-header
      [profile]="profileResource.value()"
      [user]="user()"
    />

    <app-profile-info-section
      [profile]="profileResource.value()"
    />

    <app-address-section />
  }

</div>
