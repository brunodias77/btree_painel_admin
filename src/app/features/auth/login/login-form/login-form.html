@if (serverError()) {
  <div
    class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6"
    role="alert"
  >
    <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
    </svg>
    <span>{{ serverError() }}</span>
  </div>
}

<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="space-y-5">

  <app-input
    formControlName="identifier"
    id="identifier"
    label="Usuário ou e-mail"
    placeholder="seu@email.com"
    [error]="identifierError()"
  />

  <div>
    <app-input
      formControlName="password"
      id="password"
      type="password"
      label="Senha"
      placeholder="••••••••"
      [showPasswordToggle]="true"
      [error]="passwordError()"
    />
    <div class="mt-2 text-right">
      <a routerLink="/forgot-password" class="text-xs text-zinc-500 hover:text-zinc-900 hover:underline">
        Esqueci minha senha
      </a>
    </div>
  </div>

  <app-button type="submit" [loading]="loading()" [block]="true">
    {{ loading() ? 'Entrando...' : 'Entrar' }}
  </app-button>

</form>

<p class="mt-6 text-center text-sm text-zinc-500">
  Não tem uma conta?
  <a routerLink="/register" class="font-medium text-zinc-900 hover:underline">Criar conta</a>
</p>
