<div class="min-h-screen flex">

  <!-- Left panel: branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-zinc-950 flex-col justify-between p-12">
    <div>
      <span class="text-white text-2xl font-bold tracking-tight">btree</span>
    </div>
    <div>
      <h1 class="text-white text-4xl font-semibold leading-tight mb-4">
        Painel Administrativo
      </h1>
      <p class="text-zinc-400 text-lg">
        Gerencie sua operação com controle total e segurança.
      </p>
    </div>
    <p class="text-zinc-600 text-sm">&copy; {{ currentYear }} btree. Todos os direitos reservados.</p>
  </div>

  <!-- Right panel: form -->
  <div class="flex-1 flex items-center justify-center bg-white px-6 py-12">
    <div class="w-full max-w-sm">

      <div class="lg:hidden mb-8">
        <span class="text-zinc-900 text-2xl font-bold tracking-tight">btree</span>
      </div>

      <!-- Lock icon -->
      <div class="flex items-center justify-center w-12 h-12 rounded-full bg-zinc-100 mb-6">
        <svg class="w-6 h-6 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>

      <h2 class="text-2xl font-semibold text-zinc-900 mb-1">Verificação em dois fatores</h2>
      <p class="text-zinc-500 text-sm mb-8">
        Abra seu aplicativo autenticador e informe o código de 6 dígitos.
        Este código expira a cada 30 segundos.
      </p>

      <app-two-factor-verify-form [transactionId]="transactionId()" />

    </div>
  </div>

</div>
