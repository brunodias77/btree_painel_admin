<div class="min-h-screen bg-zinc-50">

  <!-- Top nav -->
  <header class="bg-white border-b border-zinc-200">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <span class="text-zinc-900 font-bold text-lg tracking-tight">btree</span>

      <div class="flex items-center gap-4">
        <!-- Avatar + username -->
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-full bg-zinc-900 flex items-center justify-center shrink-0">
            <span class="text-white text-xs font-semibold">
              {{ auth.user()?.username?.charAt(0)?.toUpperCase() }}
            </span>
          </div>
          <span class="text-sm font-medium text-zinc-700 hidden sm:block">
            {{ auth.user()?.username }}
          </span>
        </div>

        <!-- Logout -->
        <button
          type="button"
          (click)="auth.logout()"
          class="flex items-center gap-1.5 text-sm text-zinc-500 hover:text-zinc-900 transition-colors"
          aria-label="Sair"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          <span class="hidden sm:inline">Sair</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10">

    <!-- Welcome card -->
    <div class="rounded-xl border border-zinc-200 bg-white p-8 shadow-sm">
      <p class="text-sm font-medium text-zinc-500 mb-1">Bem-vindo de volta</p>
      <h1 class="text-2xl font-semibold text-zinc-900">
        {{ auth.user()?.username }}
      </h1>
      <p class="mt-1 text-sm text-zinc-400">{{ auth.user()?.email }}</p>
    </div>

  </main>

</div>
