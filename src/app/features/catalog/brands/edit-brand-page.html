<div class="p-6 lg:p-8">
  <div class="mx-auto max-w-xl">

    @if (brand()) {
      <!-- Card -->
      <div class="rounded-2xl border border-zinc-200 bg-white shadow-sm">

        <!-- Cabeçalho -->
        <div class="border-b border-zinc-100 px-6 py-5">
          <h1 class="text-lg font-semibold text-zinc-900">Editar marca</h1>
          <p class="mt-0.5 text-sm text-zinc-500">
            Editando <span class="font-medium text-zinc-700">{{ brand()!.name }}</span>
          </p>
        </div>

        <!-- Erros do servidor -->
        @if (serverErrors().length > 0) {
          <div class="mx-6 mt-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3">
            <p class="text-sm font-medium text-red-700 mb-1">Não foi possível salvar as alterações:</p>
            <ul class="list-disc list-inside space-y-0.5">
              @for (error of serverErrors(); track error) {
                <li class="text-sm text-red-600">{{ error }}</li>
              }
            </ul>
          </div>
        }

        <!-- Formulário -->
        <div class="px-6 py-5">
          <app-edit-brand-form
            [brand]="brand()!"
            [submitting]="submitting()"
            (submitted)="onSubmit($event)"
            (cancelled)="onCancel()"
          />
        </div>

      </div>
    }

  </div>
</div>
